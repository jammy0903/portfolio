*{box-sizing:border-box;margin:0;padding:0}

.era-card.pending{opacity:.45;cursor:not-allowed;border-color:#bbb;pointer-events:none}

.era-emoji{font-size:1.8rem;margin-bottom:.15rem}
.era-num{font-size:.7rem;font-weight:800;color:var(--sub);letter-spacing:.07em}
.era-title{font-size:.95rem;font-weight:800;line-height:1.35;font-family:"Nanum Myeongjo",serif}
.era-status{font-size:.7rem;color:#888;margin-top:.3rem}
.era-card:not(.pending) .era-status{color:var(--main);font-weight:700}
.footer{margin-top:3rem;font-size:.75rem;color:#aaa;text-align:center;line-height:1.6}
